version: "3.9"

services:
  db:
    image: postgres:16
    container_name: usermanager_db
    restart: always
    environment:
      POSTGRES_DB: userManager
      POSTGRES_USER: bd_admin
      POSTGRES_PASSWORD: your_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/db_init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432" # remover em produção <---
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bd_admin -d userManager"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: usermanager_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

volumes:
  postgres_data: